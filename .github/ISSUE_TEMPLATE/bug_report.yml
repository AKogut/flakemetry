name: Bug report
description: Something is broken
labels: ['type:bug']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps, config or repository to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package versions or commit sha
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: OS, node version, CI provider, test framework
