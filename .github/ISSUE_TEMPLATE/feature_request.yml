name: Feature request
description: Propose an improvement
labels: ['type:feature']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who has it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
