services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flakemetry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flakemetry}
      POSTGRES_DB: ${POSTGRES_DB:-flakemetry}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-flakemetry} -d ${POSTGRES_DB:-flakemetry}']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-flakemetry}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-flakemetry123}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-flakemetry} $${MINIO_ROOT_PASSWORD:-flakemetry123} &&
      mc mb --ignore-existing local/$${S3_BUCKET:-flakemetry-artifacts}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-flakemetry}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-flakemetry123}
      S3_BUCKET: ${S3_BUCKET:-flakemetry-artifacts}

  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flakemetry}:${POSTGRES_PASSWORD:-flakemetry}@postgres:5432/${POSTGRES_DB:-flakemetry}?schema=public
    restart: 'no'

  api:
    build:
      context: .
      target: api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-flakemetry}:${POSTGRES_PASSWORD:-flakemetry}@postgres:5432/${POSTGRES_DB:-flakemetry}?schema=public
    ports:
      - '${API_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health']
      interval: 10s
      timeout: 3s
      retries: 6

  worker:
    build:
      context: .
      target: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flakemetry}:${POSTGRES_PASSWORD:-flakemetry}@postgres:5432/${POSTGRES_DB:-flakemetry}?schema=public
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-1000}

  web:
    build:
      context: .
      target: web
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-flakemetry}:${POSTGRES_PASSWORD:-flakemetry}@postgres:5432/${POSTGRES_DB:-flakemetry}?schema=public
      AUTH_SECRET: '${AUTH_SECRET:?set AUTH_SECRET in .env, generate one with openssl rand -base64 32}'
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: 'true'
    ports:
      - '${WEB_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 3s
      retries: 6

volumes:
  pgdata:
  miniodata:
